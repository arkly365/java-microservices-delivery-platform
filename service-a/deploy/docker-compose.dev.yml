services:
  service-a-dev:
    image: 127.0.0.1:5000/service-a:dev-${IMAGE_TAG:-latest}
    container_name: service-a-dev
    ports:
      - "127.0.0.1:18081:8080"
    environment:
      APP_ENV: dev
      APP_BRANCH: ${APP_BRANCH}
      APP_IMAGE_TAG: ${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - lab-net

networks:
  lab-net:
    external: true
    name: jenkins-cicd-lab_lab-net