services:
  service-a-prod:
    image: 127.0.0.1:5000/service-a:prod-${IMAGE_TAG:-latest}
    container_name: service-a-prod
    ports:
      - "127.0.0.1:28081:8080"
    environment:
      APP_ENV: prod
      APP_BRANCH: ${APP_BRANCH}
      APP_IMAGE_TAG: ${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - lab-net

networks:
  lab-net:
    external: true
    name: jenkins-cicd-lab_lab-net